<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings - FilterTube</title>

<link rel="icon" type="image/png" sizes="16x16" href="icon16.png">

<style>
:root {
  --bg: #121212;
  --card: #1a1a2a;
  --text: #F1F1F1;
  --muted: #9CA3AF;
  --border: #2d2d3a;
  --red: #FF0000;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

.card {
  background: var(--card);
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-weight: bold;
}

.desc {
  font-size: 12px;
  color: var(--muted);
}

input[type="checkbox"] {
  transform: scale(1.3);
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.danger {
  background: var(--red);
  color: white;
}

.secondary {
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>Settings</h2>

<button class="secondary" onclick="window.location.href='dashboard.html'">
  ← Back to Dashboard
</button>

<!-- SETTINGS -->
<div class="card">
  <div>
    <div class="title">Enable App</div>
    <div class="desc">Turn FilterTube ON/OFF</div>
  </div>
  <input type="checkbox" id="enableApp">
</div>

<div class="card">
  <div class="title">Hide Shorts</div>
  <input type="checkbox" id="hideShorts">
</div>

<div class="card">
  <div class="title">Focus Mode</div>
  <input type="checkbox" id="focusMode">
</div>

<!-- DELETE -->
<div class="card">
  <div>
    <div class="title">Delete Account</div>
    <div class="desc">Permanently remove all your data</div>
  </div>
  <button class="danger" id="deleteBtn">Delete</button>
</div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged,
  EmailAuthProvider,
  reauthenticateWithCredential,
  deleteUser
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
  ref,
  get,
  update,
  remove
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

let uid = null;
let userRef = null;

// ================= AUTH CHECK =================
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  uid = user.uid;
  userRef = ref(db, "users/" + uid + "/settings");

  // ================= LOAD SETTINGS =================
  const snap = await get(userRef);

  if (snap.exists()) {
    const data = snap.val();

    document.getElementById("enableApp").checked = data.enableApp ?? true;
    document.getElementById("hideShorts").checked = data.hideShorts ?? false;
    document.getElementById("focusMode").checked = data.focusMode ?? false;
  }

  // ================= SAVE SETTINGS =================
  function save() {
    update(userRef, {
      enableApp: document.getElementById("enableApp").checked,
      hideShorts: document.getElementById("hideShorts").checked,
      focusMode: document.getElementById("focusMode").checked
    });
  }

  document.getElementById("enableApp").addEventListener("change", save);
  document.getElementById("hideShorts").addEventListener("change", save);
  document.getElementById("focusMode").addEventListener("change", save);

});

// ================= DELETE ACCOUNT =================
document.getElementById("deleteBtn").addEventListener("click", async () => {
  try {
    const user = auth.currentUser;

    if (!user) {
      alert("Not logged in");
      return;
    }

    // ⚠️ REQUIRED: reauthentication
    const password = prompt("Enter your email password to confirm delete:");

    if (!password) return;

    const credential = EmailAuthProvider.credential(
      user.email,
      password
    );

    await reauthenticateWithCredential(user, credential);

    const uid = user.uid;

    // DELETE DATABASE
    await remove(ref(db, "users/" + uid));
    await remove(ref(db, "analytics/" + uid));

    // DELETE AUTH ACCOUNT
    await deleteUser(user);

    alert("Account deleted successfully");

    window.location.href = "index.html";

  } catch (err) {
    console.error(err);

    if (err.code === "auth/requires-recent-login") {
      alert("Please log in again and retry.");
    } else {
      alert(err.message);
    }
  }
});
</script>

</body>
</html>
