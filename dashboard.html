<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FilterTube Dashboard</title>

<link rel="icon" type="image/png" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon16.png">

<style>
:root {
  --bg:#0b0f19;
  --panel:#111827;
  --card:#0f172a;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#ff0000;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:24px;
  position:fixed;
}

.brand{
  font-size:18px;
  font-weight:700;
  margin-bottom:30px;
}

.brand span{ color:var(--accent); }

.nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav a{
  color:var(--muted);
  text-decoration:none;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

.nav a:hover{
  background:rgba(255,255,255,0.05);
  color:var(--text);
}

/* MAIN */
.main{
  margin-left:260px;
  width:100%;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--card);
  padding:8px 12px;
  border-radius:12px;
}

.user img{
  width:35px;
  height:35px;
  border-radius:50%;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
}

.card h2{
  margin-top:10px;
}
</style>


</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">
  <div class="brand">Filter<span>Tube</span></div>

  <div class="nav">
    <a href="profile.html">Profile</a>
    <a href="analytics.html">Analytics</a>
    <a href="upgrade.html">Upgrade</a>
    <a href="setting.html">Settings</a>
    <a href="logout.html" id="logoutBtn">Logout</a>
  </div>
</div>

<!-- MAIN -->

<div class="main">

  <div class="header">


<h2>Dashboard</h2>

<div class="user">
  <img id="userPhoto">
  <div>
    <div id="userName">Loading...</div>
    <div id="userPlan" style="font-size:12px;color:gray;">
      Free Plan
    </div>
  </div>
</div>


  </div>

  <!-- STATS -->

  <div class="grid">


<div class="card">
  <p>Watch Time</p>
  <h2>--</h2>
</div>

<div class="card">
  <p>Time Saved</p>
  <h2>--</h2>
</div>

<div class="card">
  <p>Blocked Videos</p>
  <h2>--</h2>
</div>

<div class="card">
  <p>Focus Score</p>
  <h2>--</h2>
</div>


  </div>

</div>

<script type="module" src="./dashboard.js"></script>

<script type="module">
import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
  ref,
  get
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

// MAIN FLOW
onAuthStateChanged(auth, async (user) => {

  // ❌ If not logged in → redirect
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const uid = user.uid;

  // 🔥 GET USER DATA FROM FIREBASE
  const snapshot = await get(ref(db, "analytics/" + uid));

  if (!snapshot.exists()) {
    console.log("No analytics found");
    return;
  }

  const data = snapshot.val();

  console.log("User Analytics:", data);

  // ================= UPDATE UI =================

  document.querySelector(".grid").innerHTML = `
    <div class="card">
      <h2>${data.timeSaved}</h2>
      <p>Time Saved</p>
    </div>

    <div class="card">
      <h2>${data.blockedVideos}</h2>
      <p>Videos Blocked</p>
    </div>

    <div class="card">
      <h2>${data.focus}</h2>
      <p>Focus Score</p>
    </div>
  `;

});
</script>
</body>
</html>
