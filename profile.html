<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile - FilterTube</title>


<link rel="icon" type="image/png" sizes="16x16" href="icon16.png">

<style>
:root {
  --bg: #121212;
  --card: #1a1a2a;
  --card2: #1E1E2E;
  --text: #F1F1F1;
  --muted: #9CA3AF;
  --border: #2d2d3a;
  --red: #FF0000;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.header h1 {
  font-size: 26px;
}

.badge {
  background: var(--red);
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* PROFILE CARD */
.profile-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  gap: 20px;
  align-items: center;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid var(--red);
}

.info h2 {
  margin: 0;
}

.info p {
  margin: 5px 0;
  color: var(--muted);
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.stat {
  background: var(--card2);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid var(--border);
}

.stat h3 {
  margin: 0;
  font-size: 22px;
}

.stat p {
  color: var(--muted);
  font-size: 12px;
}

/* SETTINGS */
.section {
  margin-top: 30px;
}

.section h2 {
  margin-bottom: 10px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
}

/* BUTTONS */
button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.logout {
  background: var(--red);
  color: white;
}

.secondary {
  background: #333;
  color: white;
}

</style>
</head>

<body>

<div class="container">
    <button onclick="window.location.href='dashboard.html'" class="secondary">
  ← Back to Dashboard
    </button>
  <!-- HEADER -->
  <div class="header">
    <h1>My Profile</h1>
    <div class="badge">USER</div>
  </div>

  <!-- PROFILE CARD -->
  <div class="profile-card">

    <img id="avatar" class="avatar" src="" alt="User">

    <div class="info">
      <h2 id="name">Loading...</h2>
      <p id="email">Loading...</p>
      <p id="plan">Plan: Loading...</p>
    </div>

  </div>



  <!-- STATS (STATIC FOR NOW) -->
  <div class="stats">

    <div class="stat">
      <h3>--</h3>
      <p>Watch Time</p>
    </div>

    <div class="stat">
      <h3>--</h3>
      <p>Filters Active</p>
    </div>

    <div class="stat">
      <h3>--</h3>
      <p>Productivity Score</p>
    </div>

  </div>

  <!-- SETTINGS -->
  <div class="section">

    <h2>Account Settings</h2>

    <div class="card">
      <span>Change Password</span>
      <button class="secondary">Edit</button>
    </div>

    <div class="card">
      <span>Manage Subscription</span>
      <button class="secondary">Upgrade</button>
    </div>

    <div class="card">
      <span>Privacy Settings</span>
      <button class="secondary">Open</button>
    </div>

  </div>

  <!-- LOGOUT -->
  <div class="section">
    <button class="logout" id="logoutBtn">Logout</button>
  </div>

</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
  ref,
  get
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // Google Data
  document.getElementById("name").textContent =
    user.displayName || "User";

  document.getElementById("email").textContent =
    user.email || "";

  document.getElementById("avatar").src =
    user.photoURL || "https://via.placeholder.com/90";

  // Firebase DB Data
  try {

    const snapshot = await get(
      ref(db, "users/" + user.uid)
    );

    if (snapshot.exists()) {

      const data = snapshot.val();

      document.getElementById("plan").textContent =
        "Plan: " + (data.plan || "Free");

    } else {

      document.getElementById("plan").textContent =
        "Plan: Free";
    }

  } catch (err) {
    console.error(err);
  }

});

// LOGOUT
document.getElementById("logoutBtn")
.addEventListener("click", async () => {

  await signOut(auth);

  window.location.href = "login.html";

});
</script>

</body>
</html>
